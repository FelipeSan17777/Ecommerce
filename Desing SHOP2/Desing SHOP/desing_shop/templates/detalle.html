{% extends './plantillas/base.html' %}

{% load static %}

{% block estilos %}
    <link rel="stylesheet" href="{% static 'estilo/detalle.css' %}">
    <!-- Asegurate de tener Bootstrap cargado en tu base.html -->
{% endblock %}

{% block main %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 text-center">
            <img src="{% static 'img/' %}{{ pantalon.imagen }}" alt="{{ pantalon.nombre }}" class="img-pantalon">
        </div>
        <div class="col-md-6">
            <h2 class="mb-3">{{ pantalon.nombre }}</h2>
            <p><strong>Talla:</strong> {{ pantalon.get_talla_display }}</p>
            <p><strong>Precio:</strong> <span class="text-success h4">${{ pantalon.precio }}</span></p>
            <a href="{% url 'pantalones' %}" class="btn btn-outline-dark mt-3">← Volver al catálogo</a>
            <form action="" method="post" class="mt-3">
                {% csrf_token %}
                <a href="{% url 'agregar_al_carrito' pantalon.id %}" class="btn btn-morado mt-3">Agregar al carrito 🛒</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
